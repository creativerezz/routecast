name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast, isolated signal for community pricing PRs (JSON-only edits).
  pricing-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run packages/pricing

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - name: CLI smoke test (fixture data)
        run: node packages/cli/dist/index.js analyze --dir packages/core/test/fixtures/claude-code --since 36500d --json | head -5
